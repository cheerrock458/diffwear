<!DOCTYPE html>
<html>
<head>
    <title>Add Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #000, #002f2f);
            color: white;
        }

        .box {
            max-width: 500px;
            margin: 80px auto;
            padding: 30px;
            background: #111;
            border-radius: 20px;
            box-shadow: 0 0 30px #00ffe1;
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp {
            from {transform: translateY(40px); opacity:0;}
            to {transform: translateY(0); opacity:1;}
        }

        input, select {
            background: #000 !important;
            color: white !important;
            border: 1px solid #333 !important;
        }

        .btn-neon {
            background: #00ffe1;
            color: black;
        }
    </style>
</head>

<body>

    
<div class="box">
    <h2 class="text-center mb-4">🔥 Add Product</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <input type="text" name="name" class="form-control mb-3" placeholder="Product Name" required>

        <input type="number" name="price" class="form-control mb-3" placeholder="Price" required>

        <select name="category" class="form-control mb-3">
            <option value="shirt">Shirt</option>
            <option value="pants">Pants</option>
            <option value="jacket">Jacket</option>
        </select>

        <input type="file" name="image" class="form-control mb-3" required>

        <button class="btn btn-neon w-100">🚀 Add Product</button>
    </form>

    <a href="/" class="btn btn-outline-light w-100 mt-2">⬅ Back</a>
</div>

</body>
