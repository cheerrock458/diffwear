<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0a0a0a;
            color: white;
        }

        h1 {
            color: #00ffe1;
        }

        table {
            background: #111;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #000;
            color: #00ffe1;
        }

        td {
            vertical-align: middle;
        }

        img {
            height: 80px;
            border-radius: 10px;
        }

        .price {
            color: #00ffe1;
            font-weight: bold;
        }

        .btn-neon {
            background: #00ffe1;
            color: black;
            border: none;
        }

        .btn-neon:hover {
            background: #00cbb5;
        }

        .total-box {
            text-align: right;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h1>🛒 Your Cart</h1>

    {% if products %}

    <table class="table table-dark table-hover mt-4">
        <thead>
            <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            {% for p in products %}
            <tr>
                <td><img src="{{ p.image.url }}"></td>
                <td>{{ p.name }}</td>
                <td>{{ p.category }}</td>
                <td class="price">฿{{ p.price }}</td>
                <td>
                    <a href="/remove/{{ p.id }}/" class="btn btn-danger btn-sm">Remove</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <div class="total-box">
        <h3>Total: <span class="price">฿{{ total }}</span></h3>

        <a href="/checkout/" class="btn btn-neon">💳 Checkout</a>
        <a href="/" class="btn btn-light">⬅ Back</a>
    </div>

    {% else %}

    <h3 class="mt-4">Cart is empty 😢</h3>
    <a href="/" class="btn btn-light mt-2">Go Shopping</a>

    {% endif %}

</div>

</body>
</html>
