<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#0a0a0a;color:white;">

    {% include 'game/navbar.html' %}

<div class="container mt-4">

    <h3>💬 {{ convo.product.name }}</h3>

    <div style="height:400px;overflow:auto;background:#111;padding:10px;border-radius:10px;">
        {% for m in messages %}
            <div style="margin-bottom:10px;">
                <b>{{ m.sender.username }}</b>: {{ m.text }}
            </div>
        {% endfor %}
    </div>

    <form method="POST" class="mt-3">
        {% csrf_token %}
        <input type="text" name="text" class="form-control mb-2" placeholder="พิมพ์ข้อความ...">
        <button class="btn btn-success w-100">Send</button>
    </form>

</div>

</body>
</html>
