
<!DOCTYPE html>
<html>
<head>
    <title>Chats</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#0a0a0a;color:white;">
    {% include 'game/navbar.html' %}

<div class="container mt-5">
    <h2>💬 Chat List</h2>

    {% for c in chats %}
        <div class="card mb-2 p-3 bg-dark text-white">
            <b>{{ c.product.name }}</b><br>
            <a href="/chat/{{ c.id }}/" class="btn btn-info mt-2">Open Chat</a>
        </div>
    {% empty %}
        <p>ไม่มีแชท</p>
    {% endfor %}
</div>

</body>

</html>
