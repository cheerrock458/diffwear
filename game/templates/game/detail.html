
<!DOCTYPE html>
<html>
<head>
    <title>{{ product.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0a0a0a;
            color: white;
        }

        .price {
            color: #00ffe1;
            font-size: 30px;
        }
        .btn-buynow {
    position: relative;
    background: linear-gradient(90deg, #00ffe1, #ff3b3b, #00ffe1);
    background-size: 300% 300%;
    color: black;
    font-weight: 800;
    letter-spacing: 2px;
    border: none;
    padding: 12px;
    border-radius: 12px;
    overflow: hidden;
    transition: 0.3s;
    animation: gradientMove 3s ease infinite;
    box-shadow: 0 0 15px rgba(0,255,225,0.4);
}

/* hover effect */
.btn-buynow:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px #00ffe1, 0 0 40px #ff3b3b;
}

/* moving gradient */
@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* glow line effect */
.btn-buynow::after {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: 0.5s;
}

.btn-buynow:hover::after {
    left: 100%;
}
.btn-back {
    display: inline-block;
    background: transparent;
    color: #00ffe1;
    border: 2px solid #00ffe1;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 10px 18px;
    border-radius: 10px;
    position: relative;
    overflow: hidden;
    transition: 0.3s;
}

/* hover glow */
.btn-back:hover {
    background: #00ffe1;
    color: black;
    transform: scale(1.05);
    box-shadow: 0 0 20px #00ffe1;
}

/* shine effect */
.btn-back::after {
    content: "";
    position: absolute;
    top: 0;
    left: -120%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: 0.5s;
}

.btn-back:hover::after {
    left: 120%;
}
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="row">
        <div class="col-md-6">
            <img src="{{ product.image.url }}" class="img-fluid rounded">
        </div>

        <div class="col-md-6">
            <h2>{{ product.name }}</h2>
            <p>{{ product.description }}</p>
            <p class="price">฿{{ product.price }}</p>

            <a href="/buy-now/{{ product.id }}/" class="btn btn-buynow w-100">
    💬 BUY NOW
</a>
            <a href="javascript:history.back()" class="btn btn-back">
    ⬅ BACK
</a>
        </div>
    </div>

</div>

</body>

</html>
