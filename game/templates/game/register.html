<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #000, #002f2f);
            color: white;
        }

        .box {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background: #111;
            border-radius: 20px;
            box-shadow: 0 0 30px #00ffe1;
            animation: slideUp 1s ease;
        }

        @keyframes slideUp {
            from {transform: translateY(50px); opacity:0;}
            to {transform: translateY(0); opacity:1;}
        }

        input {
            background: #000 !important;
            color: white !important;
        }

        .btn-neon {
            background: #00ffe1;
            color: black;
        }
    </style>
</head>

<body>

<div class="box">
    <h2 class="text-center mb-3">🔥 Register</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="btn btn-neon w-100">Register</button>
    </form>

    <a href="/login/" class="btn btn-outline-light w-100 mt-2">Back to Login</a>
</div>

</body>
</html>
